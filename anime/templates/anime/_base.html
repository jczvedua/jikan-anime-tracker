<!doctype html>
<html lang=en>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}Jikan{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="https://fonts.googleapis.com/css2?family=Klee+One&display=swap" rel="stylesheet">
        <style>
            body {
                font-family: "Klee One", cursive;
            }
            .card {
                height: 350px;
            }
            .card-body p {
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand" href="/">Jikan</a>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <form class="d-flex me-3 gap-3" method="get" action="{% url 'anime_search' %}">
                                    <input type="text" name="q" placeholder="Search for anime..." value="{{ query|default:'' }}">
                                    <button class="btn btn-primary" type="submit">Search</button>
                                </form>
                            </li>
                        <ul class="navbar-nav">  
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" 
                                    href="{% url 'view_list' %}">
                                    My List</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" 
                                    href="{% url 'random_anime' %}">
                                    Random Anime
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        <main>
            {% block content%}
            <h1>Hello world</h1>
            {% endblock %}
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
